<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - VW Auto Peças 3</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --muted: #6b7280;
      --accent: #1E40AF; /* azul BB escuro */
      --accent-light: #3B82F6;
      --radius: 12px;
      --maxw: 900px;
      --shadow: 0 6px 20px rgba(16,24,40,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background: var(--bg);
      color: #111827;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main {
      max-width: var(--maxw);
      margin: 40px auto;
      padding: 0 20px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      flex: 1;
    }
    h1 {
      color: var(--accent);
      text-align: center;
      margin-top: 0;
      padding-top: 20px;
    }
    section {
      padding: 20px 0;
    }
    h2 {
      color: var(--accent);
      margin-top: 24px;
      margin-bottom: 12px;
    }
    p {
      margin-bottom: 12px;
      color: #374151;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    input, textarea, button {
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid #d1d5db;
      font-size: 14px;
      width: 100%;
      font-family: inherit;
    }
    button.btn {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    button.btn:hover {
      background: var(--accent-light);
    }
    .btn-back {
      display: block;
      width: fit-content;
      margin: 30px auto;
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      text-align: center;
      transition: background 0.3s;
    }
    .btn-back:hover {
      background: var(--accent-light);
    }
    iframe {
      border: 0;
      border-radius: var(--radius);
      margin-top: 16px;
    }
    footer {
      text-align: center;
      padding: 18px;
      color: #6b7280;
      font-size: 14px;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <main>
    <h1>Contato</h1>
    <section>
      <h2>Fale Conosco</h2>
      <p>📞 Telefone: (99) 99999-9999</p>
      <p>📍 Endereço: Rua Exemplo, 123 - Cidade/UF</p>
      <p>⏰ Horário: Seg a Sab, 8h às 17h</p>

      <form action="https://formsubmit.co/SEUEMAILAQUI" method="POST">
        <input type="text" name="nome" placeholder="Seu nome" required>
        <input type="email" name="email" placeholder="Seu e-mail" required>
        <textarea name="mensagem" placeholder="Digite sua mensagem" required></textarea>
        <button type="submit" class="btn">Enviar</button>
      </form>

      <iframe src="https://www.google.com/maps/embed?pb=!1m18..." width="100%" height="300" allowfullscreen="" loading="lazy"></iframe>
    </section>

    <a class="btn-back" href="index.html">← Voltar para a Página Inicial</a>
  </main>

  <footer>
    &copy; 2025 VW Auto Peças 3 - CNPJ: 00.000.000/0001-00
  </footer>
</body>
</html>
